scrape_configs:
  - job_name: "express-app"
    scrape_interval: 1s
    static_configs:
      - targets: ["app:3000"]

  - job_name: "node-exporter"
    scrape_interval: 1s
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "fastify-app"
    scrape_interval: 1s
    static_configs:
      - targets: ["app:3005"]

  - job_name: "express-app-grpc"
    scrape_interval: 1s
    static_configs:
      - targets: ["express_grpc_api:3010"]

  - job_name: "fastify-app-grpc"
    scrape_interval: 1s
    static_configs:
      - targets: ["fastify-grpc-api:3015"]